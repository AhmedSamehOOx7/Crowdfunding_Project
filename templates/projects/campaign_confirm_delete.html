{% extends "base.html" %}

{% block title %}Delete Campaign - Crowdfunding{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-exclamation-triangle text-danger fa-4x mb-4"></i>
                        <h3 class="fw-bold mb-3">Delete Campaign?</h3>
                        <p class="text-muted mb-4">Are you sure you want to delete "{{ campaign.title }}"? This action cannot be undone.</p>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                            <a href="{% url 'campaign_detail' campaign.pk %}" class="btn btn-outline-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
